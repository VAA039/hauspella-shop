{% extends "base.html" %}

{% block title %}
Каталог товаров
{% endblock %}

{% block content %}

<h1>Каталог товаров</h1>

<hr>

{% for product in products %}

<h2>{{ product.name }}</h2>

<p>
    Цена: {{ product.price }} ₽
</p>

<p>
    <a href="{% url 'catalog:product_detail' product.pk %}">
        Подробнее
    </a>
</p>

<hr>

{% empty %}

<p>Товары пока отсутствуют.</p>

{% endfor %}

{% endblock %}
