{% extends "base.html" %}

{% block title %}
Личные данные
{% endblock %}

{% block content %}

<h1 class="mb-4">
    Личные данные
</h1>

<div class="card shadow-sm rounded-4">

    <div class="card-body">

        <h4 class="mb-4">
            Информация о пользователе
        </h4>

        <form method="post">

            {% csrf_token %}

            <div class="mb-3">

                <label class="form-label">

                    Имя

                </label>

                {{ form.first_name }}

            </div>

            <div class="mb-4">

                <label class="form-label">

                    Фамилия

                </label>

                {{ form.last_name }}

            </div>

            <button
                type="submit"
                class="btn btn-dark"
            >
                Сохранить изменения
            </button>

        </form>

    </div>

</div>

{% endblock %}
